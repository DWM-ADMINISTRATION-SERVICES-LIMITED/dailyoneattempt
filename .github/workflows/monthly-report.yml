name: Monthly Report Check

on:
  schedule:
    # Run daily at 10:00 UTC (from 2nd of each month, the script self-gates)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Target month (YYYY-MM), leave blank for previous month'
        required: false
      force:
        description: 'Send report even if reviews are incomplete'
        required: false
        default: 'false'

jobs:
  check-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, mbstring

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Run monthly report check
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="${{ github.event.inputs.month }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          php monthly-report.php $ARGS
